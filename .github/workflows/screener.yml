name: Reversal Screener

on:
  schedule:
    # Runs at 9:30 AM EST (14:30 UTC) — right at market open
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run screener
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_GAIN_PCT:     "100"
          MIN_RSI:          "75"
          MAX_PRICE:        "5.0"
          MIN_VOLUME:       "300000"
          TOP_N:            "5"
        run: python screener.py
