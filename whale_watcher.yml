name: 🐋 Polymarket Whale Watcher

on:
  schedule:
    # Runs every 5 minutes — the minimum GitHub allows
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Adds a "Run workflow" button in GitHub UI so you can test manually

jobs:
  watch:
    runs-on: ubuntu-latest
    # Allow the job to push seen_trades.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run whale watcher
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          WHALE_THRESHOLD_USD: ${{ secrets.WHALE_THRESHOLD_USD }}
          MARKET_KEYWORDS:     ${{ secrets.MARKET_KEYWORDS }}
        run: python whale_watcher.py

      - name: Save seen trades back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_trades.json
          git diff --staged --quiet || git commit -m "chore: update seen trades [skip ci]"
          git push
